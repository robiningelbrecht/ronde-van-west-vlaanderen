<!doctype html>
<html lang="nl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ronde van West-Vlaanderen</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg"/>
    <link rel="stylesheet" href="./src/output.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-gpx@2.1.2/gpx.js"></script>
</head>
<body class="relative m-0 h-screen w-screen overflow-hidden">

<!-- Header -->
<header class="pointer-events-none fixed top-0 left-0 z-[1000] flex w-full items-start justify-between gap-3 bg-gradient-to-b from-black/60 to-transparent px-4 py-4 sm:px-6 sm:py-5">
  <h1 class="min-w-0 truncate text-lg font-bold tracking-tight text-white drop-shadow-lg sm:text-2xl">Ronde van West-Vlaanderen</h1>
  <div class="pointer-events-auto flex shrink-0 gap-1.5 sm:gap-2">
    <button id="weather-toggle" class="flex h-9 items-center gap-1.5 rounded-lg bg-white/90 px-2.5 shadow-lg backdrop-blur transition hover:bg-white sm:h-10 sm:px-3" onclick="toggleWeather()">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
      </svg>
      <span id="weather-toggle-text" class="text-xs font-semibold text-gray-700">Weer laden...</span>
    </button>
    <a href="./route.gpx" download class="flex h-9 cursor-pointer items-center gap-1.5 rounded-lg bg-white/90 px-2.5 shadow-lg backdrop-blur transition hover:bg-white sm:h-10 sm:px-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3"/>
      </svg>
      <span class="hidden text-xs font-semibold text-gray-700 sm:inline">.GPX</span>
    </a>
    <button id="menu-toggle" class="flex h-9 w-9 cursor-pointer items-center justify-center rounded-lg bg-white/90 shadow-lg backdrop-blur transition hover:bg-white sm:h-10 sm:w-10" onclick="document.getElementById('menu-panel').classList.toggle('translate-x-full')">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>
</header>

<!-- Side panel -->
<div id="menu-panel" class="fixed top-0 right-0 z-[1001] flex h-full w-full translate-x-full transform flex-col bg-white/95 shadow-2xl backdrop-blur transition-transform duration-300 sm:w-80">
  <div class="flex items-center justify-between border-b border-gray-200 px-6 py-5">
    <div class="flex gap-1">
      <button onclick="showTab('participants')" data-tab="participants" class="tab-btn rounded-lg px-3 py-1.5 text-sm font-semibold transition">Deelnemers</button>
      <button onclick="showTab('checklist')" data-tab="checklist" class="tab-btn rounded-lg px-3 py-1.5 text-sm font-semibold transition">Checklist</button>
    </div>
    <button onclick="document.getElementById('menu-panel').classList.add('translate-x-full')" class="flex h-8 w-8 cursor-pointer items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div id="tab-participants" class="flex-1 overflow-y-auto px-4 py-3">
    <ul id="participant-list"></ul>
  </div>
  <div id="tab-checklist" class="hidden flex-1 overflow-y-auto px-4 py-3">
    <ul id="checklist"></ul>
  </div>
</div>

<!-- Participant modal -->
<div id="participant-modal" class="fixed inset-0 z-[1002] flex hidden items-center justify-center bg-black/50 backdrop-blur-sm" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="mx-4 w-full max-w-sm rounded-2xl bg-white p-6 shadow-2xl">
    <div class="flex flex-col items-center text-center">
      <img id="modal-avatar" class="mb-4 h-24 w-24 rounded-full object-cover shadow-md" src="" alt="">
      <h3 id="modal-name" class="mb-2 text-xl font-bold text-gray-900"></h3>
      <p id="modal-desc" class="text-sm leading-relaxed text-gray-600"></p>
    </div>
    <button onclick="document.getElementById('participant-modal').classList.add('hidden')" class="mt-6 w-full cursor-pointer rounded-xl bg-gray-900 py-2.5 text-sm font-semibold text-white transition hover:bg-gray-800">Sluiten</button>
  </div>
</div>

<!-- Stats bar -->
<div id="stats-bar" class="pointer-events-none fixed bottom-0 left-0 z-[1000] hidden w-full bg-gradient-to-t from-black/60 to-transparent px-6 pb-5 pt-10">
  <div class="pointer-events-auto flex flex-wrap items-center justify-center gap-x-6 gap-y-1">
    <div class="flex items-center gap-1.5 text-white">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
      <span id="stat-distance" class="text-sm font-semibold drop-shadow">—</span>
    </div>
    <div class="flex items-center gap-1.5 text-white">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>
      <span id="stat-elev-gain" class="text-sm font-semibold drop-shadow">—</span>
    </div>
    <div class="flex items-center gap-1.5 text-white">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
      <span id="stat-elev-loss" class="text-sm font-semibold drop-shadow">—</span>
    </div>
    <div class="flex items-center gap-1.5 text-white">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span id="stat-duration" class="text-sm font-semibold drop-shadow">—</span>
    </div>
  </div>
</div>


<!-- Weather panel -->
<div id="weather-bar" class="pointer-events-none fixed top-16 left-0 z-[999] hidden w-full px-6">
  <div class="pointer-events-auto inline-flex items-center gap-3 rounded-lg bg-white/90 px-4 py-2.5 shadow-lg backdrop-blur">
    <span id="weather-info" class="text-sm font-medium text-gray-700"></span>
    <button onclick="toggleWeather()" class="ml-1 flex h-5 w-5 cursor-pointer items-center justify-center rounded text-gray-400 transition hover:text-gray-700">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
</div>

<div id="map" class="h-full w-full"></div>

<script>
    // --- Participants ---
    const participants = [
      { name: "Gill", avatar: "participants/gill.jpeg", desc: "Altijd rustig en op z’n gemak. Terwijl de rest al na 30 km begint te klinken als een kapotte stofzuiger, rijdt hij er gewoon tussen alsof hij nog moet opwarmen. Grote uithouding, geen stress en vooral het levende bewijs dat het probleem niet het tempo is, maar gewoon de conditie van de anderen." },
      { name: "Leo", avatar: "participants/leo.png", desc: "De joker van de groep. Commentaar heeft hij altijd, over het tempo, de route, de wind, en vooral over hoe iedereen het beter zou moeten doen. Opvallend genoeg valt het even stil wanneer er zelf moet doorgetrokken worden. Maar goed, iemand moet de sfeer erin houden terwijl de rest effectief fietst." },
      { name: "Ruben", avatar: "participants/ruben.jpeg", desc: "De oudste van de groep, maar laat je niet misleiden: terwijl de rest nog bezig is met hun 'jonge benen', rijdt hij ze er één voor één af alsof het niks is. Hij zegt niet veel, waarschijnlijk omdat hij al weet hoe het gaat aflopen. Een beetje kraken en piepen bij het opstappen, maar eens hij rolt: pure vernedering voor de rest." },
      { name: "Stijn", avatar: "participants/stijn.png", desc: "De strateeg van de groep en altijd overvoorbereid. Heeft voor elke rit drie scenario’s, twee noodplannen en waarschijnlijk een Excel-sheet die niemand ooit zal zien. Gelukkig maar, want zonder hem zouden de anderen verloren rijden" },
      { name: "Robin", avatar: "participants/robin.png", desc: "Grote baas van de planning, maar zodra er een wolkje verschijnt zit hij veilig binnen op Zwift “even een training af te werken”. Kent elke route van buiten, zolang het maar virtueel is." },
    ];

    const list = document.getElementById("participant-list");
    participants.forEach((p) => {
      const li = document.createElement("li");
      li.className = "flex cursor-pointer items-center gap-3 rounded-xl px-3 py-3 transition hover:bg-gray-100";
      li.innerHTML = `<img src="${p.avatar}" class="h-10 w-10 rounded-full object-cover" alt="${p.name}"><span class="text-sm font-semibold text-gray-800">${p.name}</span>`;
      li.onclick = () => {
        document.getElementById("modal-avatar").src = p.avatar;
        document.getElementById("modal-name").textContent = p.name;
        document.getElementById("modal-desc").textContent = p.desc;
        document.getElementById("participant-modal").classList.remove("hidden");
      };
      list.appendChild(li);
    });

    // --- Checklist ---
    const checklistItems = [
      "Helm", "Handschoenen", "Zonnebril", "Bidons (2x)",
      "Energierepen", "Gels", "Reservebinnenband", "Bandenplakset",
      "Mini-pomp", "Multitool", "Regenjasje", "Beenwarmers",
      "Telefoon + houder", "Geld / bankkaart", "Zonnecrème", "Fietslichten",
    ];
    const saved = JSON.parse(localStorage.getItem("rvwv-checklist") || "{}");
    const cl = document.getElementById("checklist");
    checklistItems.forEach((item) => {
      const li = document.createElement("li");
      li.className = "flex cursor-pointer items-center gap-3 rounded-xl px-3 py-2.5 transition hover:bg-gray-100";
      const checked = saved[item] || false;
      li.innerHTML = `
        <span class="flex h-5 w-5 shrink-0 items-center justify-center rounded border-2 ${checked ? "border-green-500 bg-green-500 text-white" : "border-gray-300"}">
          ${checked ? '<svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ""}
        </span>
        <span class="text-sm ${checked ? "text-gray-400 line-through" : "text-gray-800"}">${item}</span>`;
      li.onclick = () => {
        saved[item] = !saved[item];
        localStorage.setItem("rvwv-checklist", JSON.stringify(saved));
        renderChecklist();
      };
      cl.appendChild(li);
    });

    function renderChecklist() {
      cl.innerHTML = "";
      checklistItems.forEach((item) => {
        const li = document.createElement("li");
        li.className = "flex cursor-pointer items-center gap-3 rounded-xl px-3 py-2.5 transition hover:bg-gray-100";
        const checked = saved[item] || false;
        li.innerHTML = `
          <span class="flex h-5 w-5 shrink-0 items-center justify-center rounded border-2 ${checked ? "border-green-500 bg-green-500 text-white" : "border-gray-300"}">
            ${checked ? '<svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ""}
          </span>
          <span class="text-sm ${checked ? "text-gray-400 line-through" : "text-gray-800"}">${item}</span>`;
        li.onclick = () => {
          saved[item] = !saved[item];
          localStorage.setItem("rvwv-checklist", JSON.stringify(saved));
          renderChecklist();
        };
        cl.appendChild(li);
      });
    }

    // --- Tabs ---
    function showTab(tab) {
      document.getElementById("tab-participants").classList.toggle("hidden", tab !== "participants");
      document.getElementById("tab-checklist").classList.toggle("hidden", tab !== "checklist");
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        const active = btn.dataset.tab === tab;
        btn.classList.toggle("bg-gray-900", active);
        btn.classList.toggle("text-white", active);
        btn.classList.toggle("text-gray-500", !active);
        btn.classList.toggle("hover:bg-gray-100", !active);
      });
    }
    showTab("participants");

    // --- Map ---
    const map = L.map("map", { zoomControl: false });

    L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png",
        {
            attribution:
                '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>, &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: "abcd",
            maxZoom: 20,
        },
    ).addTo(map);

    const coffeeIcon = L.icon({
        iconUrl: "./icons/marker-coffee.svg",
        iconSize: [32, 32],
        iconAnchor: [16, 16],
    });

    let routeLatLngs = [];

    const gpxLayer = new L.GPX("./route.gpx", {
        async: true,
        markers: {
            startIcon: "./icons/marker-start.svg",
            endIcon: "./icons/marker-start.svg",
            wptIcons: {},
        },
        marker_options: {
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            shadowUrl: "",
        },
        polyline_options: {
            color: "#3b82f6",
            weight: 4,
            opacity: 0.85,
        },
    })
        .on("addpoint", function (e) {
            if (e.point_type === "end") {
                e.point.bindPopup("<b>Vertrek & aankomst</b>");
            }
        })
        .on("loaded", function (e) {
            map.fitBounds(e.target.getBounds(), {padding: [20, 20]});

            // Stats
            const dist = (e.target.get_distance() / 1000).toFixed(1);
            const gain = Math.round(e.target.get_elevation_gain());
            const loss = Math.round(e.target.get_elevation_loss());
            const avgSpeed = 25;
            const hours = (e.target.get_distance() / 1000) / avgSpeed;
            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);

            document.getElementById("stat-distance").textContent = `${dist} km`;
            document.getElementById("stat-elev-gain").textContent = `${gain} m`;
            document.getElementById("stat-elev-loss").textContent = `${loss} m`;
            document.getElementById("stat-duration").textContent = `~${h}u${m.toString().padStart(2, "0")}`;
            document.getElementById("stats-bar").classList.remove("hidden");

            const layers = e.target.getLayers();
            for (const l of layers) {
              if (l.getLatLngs) {
                const lls = l.getLatLngs();
                if (lls.length > 0) {
                  routeLatLngs = Array.isArray(lls[0]) ? lls.flat() : lls;
                  break;
                }
              }
            }

            // Click on polyline for distance
            for (const l of layers) {
              if (l instanceof L.Polyline && !(l instanceof L.Polygon)) {
                l.on("click", function (ev) {
                  const clickLL = ev.latlng;
                  const distFromStart = distanceAlongRoute(clickLL);
                  L.popup()
                    .setLatLng(clickLL)
                    .setContent(`<b>${distFromStart.toFixed(1)} km</b> vanaf start`)
                    .openOn(map);
                });
              }
            }

            // Coffee stops
            L.marker([51.221954, 2.931081], {icon: coffeeIcon})
                .bindPopup("<b>Oostende</b><br>na 62km")
                .addTo(map);
            L.marker([51.1335093, 2.7491624], {icon: coffeeIcon})
                .bindPopup("<b>Nieuwpoort</b><br>Na 85km")
                .addTo(map);
            L.marker([50.7458659, 2.8297794], {icon: coffeeIcon})
                .bindPopup("<b>Nieuwkerke</b><br>na 180km")
                .addTo(map);
            L.marker([50.796206, 3.121463], {icon: coffeeIcon})
                .bindPopup("<b>Menen</b><br>Na 220km")
                .addTo(map);
            L.marker([50.891010, 3.423814], {icon: coffeeIcon})
                .bindPopup("<b>Waregem</b><br>Na 280km")
                .addTo(map);
            L.marker([51.127272, 3.372208], {icon: coffeeIcon})
                .bindPopup("<b> St Joris, Beernem</b><br>Na 325km")
                .addTo(map);

            // Weather
            fetchWeather();
        })
        .addTo(map);

    // --- Distance along route ---
    function distanceAlongRoute(latlng) {
      let minDist = Infinity;
      let closestIdx = 0;
      for (let i = 0; i < routeLatLngs.length; i++) {
        const d = latlng.distanceTo(routeLatLngs[i]);
        if (d < minDist) { minDist = d; closestIdx = i; }
      }
      let total = 0;
      for (let i = 1; i <= closestIdx; i++) {
        total += routeLatLngs[i - 1].distanceTo(routeLatLngs[i]);
      }
      return total / 1000;
    }

    // --- Weather (Open-Meteo, no API key) ---
    let weatherLoaded = false;

    async function fetchWeather() {
      try {
        let lat, lng;
        if (routeLatLngs.length > 0) {
          const mid = routeLatLngs[Math.floor(routeLatLngs.length / 2)];
          lat = mid.lat;
          lng = mid.lng;
        } else {
          const bounds = map.getBounds();
          const center = bounds.getCenter();
          lat = center.lat;
          lng = center.lng;
        }
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,wind_speed_10m,weather_code&timezone=Europe/Brussels`
        );
        const data = await res.json();
        const c = data.current;
        const icon = weatherIcon(c.weather_code);
        const summary = `${icon} ${Math.round(c.temperature_2m)}°C | Wind ${Math.round(c.wind_speed_10m)} km/u`;
        document.getElementById("weather-info").innerHTML = summary;
        document.getElementById("weather-toggle-text").innerHTML = summary;
        weatherLoaded = true;
      } catch (e) {
        document.getElementById("weather-toggle-text").textContent = "Weer niet beschikbaar";
        console.warn("Weather fetch failed", e);
      }
    }

    function weatherIcon(code) {
      if (code === 0) return "&#9728;&#65039;";
      if (code <= 3) return "&#9925;";
      if (code <= 49) return "&#127787;&#65039;";
      if (code <= 69) return "&#127783;&#65039;";
      if (code <= 79) return "&#127784;&#65039;";
      if (code <= 99) return "&#9889;";
      return "&#127781;&#65039;";
    }
</script>
</body>
</html>
